name: 每日竞赛数据更新

# 触发方式：
# 1. 每天北京时间早上7点自动运行（UTC 23:00）
# 2. 手动触发
# 3. push 到 main 分支时触发
on:
  schedule:
    - cron: "0 23 * * *"  # 北京时间次日 07:00
  workflow_dispatch:  # 支持手动触发
  push:
    branches: [main]
    paths:
      - "**.py"
      - "requirements.txt"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行爬虫采集数据
        run: python main.py
        continue-on-error: false

      - name: 校验数据文件存在
        run: |
          if [ ! -f "frontend/data.json" ]; then
            echo "❌ 数据文件不存在！"
            exit 1
          fi
          echo "✅ 数据文件存在"
          wc -l frontend/data.json

      - name: 提交更新的数据
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/competitions.json frontend/data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新竞赛数据 $(date +'%Y-%m-%d')" && git push)

      - name: 设置 Pages
        uses: actions/configure-pages@v4

      - name: 上传前端 artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

      - name: 部署到 GitHub Pages
        uses: actions/deploy-pages@v4
