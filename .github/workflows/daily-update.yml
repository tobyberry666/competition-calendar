name: 每日竞赛数据更新

# 触发方式：
# 1. 每天北京时间早上7点自动运行（UTC 23:00）
# 2. 手动触发
# 3. push 到 main 分支时触发
on:
  schedule:
    - cron: "0 23 * * *"  # 北京时间次日 07:00
  workflow_dispatch:  # 支持手动触发
  push:
    branches: [main]
    paths:
      - "**.py"
      - "requirements.txt"
      - "frontend/**"
      - ".github/workflows/**"

# 单 job 同时负责「采集数据」与「部署 Pages」，
# 确保 deploy-pages 上传的就是本工作区刚生成的 frontend（含最新数据），
# 而不是触发时的旧 commit（双 job 架构下 deploy 会 checkout 旧 SHA 导致数据不更新）。
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行爬虫采集数据
        run: python main.py

      - name: 校验数据条数
        run: |
          if [ ! -f "frontend/data.json" ]; then
            echo "❌ 数据文件不存在！"
            exit 1
          fi
          echo "✅ 数据文件存在, 当前条数:"
          grep -c '"name"' frontend/data.json

      - name: 提交更新的数据回仓库
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/competitions.json frontend/data.json data/competitions-*.json
          if git diff --staged --quiet; then
            echo "没有数据变更，跳过提交"
          else
            git commit -m "自动更新竞赛数据 $(date +'%Y-%m-%d')" || true
            git push || true
          fi

      - name: 设置 Pages
        uses: actions/configure-pages@v4

      - name: 上传前端 artifact（使用本工作区刚生成的 frontend）
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
